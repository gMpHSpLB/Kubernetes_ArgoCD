name: Monorepo CI

on:
  push:
    branches: [ main ]

jobs:
  # ---------- MYAPP ----------
  myapp:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydb
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Install Poetry 
      run: pip install poetry

    - name: Run myapp tests
      run: |
        cd myapp
        poetry install --no-root
        poetry run pytest

  # ---------- MYLEARNING ----------
  mylearning:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Poetry
      run: pip install poetry

    - name: Run mylearning tests
      run: |
        cd mylearning
        poetry install --no-root
        poetry run pytest

  docker:
    runs-on: ubuntu-latest
    needs: [myapp, mylearning]

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker images
      run: docker compose build

    - name: Run Docker tests
      run: make test-docker

    - name: Check API
      run: |
        make run
        make check-api