name: Monorepo CI

on:
  push:
    branches: [ main ]

jobs:

  test-myapp:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydb
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    - run: pip install poetry

    - run: |
        cd myapp
        poetry install --no-root
        poetry run pytest

  test-mylearning:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - run: pip install poetry

    - run: |
        cd mylearning
        poetry install --no-root
        poetry run pytest

  docker:
    runs-on: ubuntu-latest
    needs: [test-myapp, test-mylearning]

    steps:
    - uses: actions/checkout@v3

    - run: docker compose build

    - run: |
        docker compose up -d
        sleep 10
        curl -f http://localhost:8000/docs || exit 1