#docker-compose.prod.yml that fits your current stack and promotion model.
services:
  myapp:
    container_name: myapp-prod
    # No local volume mounts in prod: image is immutable artifact
    environment:
      APP_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_ENABLED: ${OTEL_ENABLED}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      UPTRACE_TOKEN: ${UPTRACE_TOKEN}
      UPTRACE_DSN: ${UPTRACE_DSN}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER}
      DISABLE_CUSTOM_MIDDLEWARE: ${DISABLE_CUSTOM_MIDDLEWARE}
    restart: always
    # In prod you typically run behind a reverse proxy / LB
    # but if you want direct access on the host:
    ports:
      - "8000:8000"

  mylearning:
    container_name: mylearning-prod
    environment:
      APP_ENV: production
      LOG_LEVEL: warn
    restart: always
    # Only expose if you need it publicly; otherwise you can drop this
    ports:
      - "8001:8000"
