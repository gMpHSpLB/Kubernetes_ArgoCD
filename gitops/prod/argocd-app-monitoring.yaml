# This is an Argo CD Application manifest that tells Argo CD 
# how to deploy and keep your monitoring stack in sync with Git. 
# It is useful because it makes your monitoring setup declarative, 
# repeatable, and automatically repaired if anything drifts in the cluster.
#
# What this file does
# This manifest creates an Argo CD application named monitoring-prod 
# in the argocd namespace. Argo CD watches the Git repository, finds 
# the monitoring configuration under the specified path, and applies 
# it to the monitoring namespace in Kubernetes.
#
# In simple terms:
#   - Git contains the desired state.
#   - Argo CD reads that state.
#   - Kubernetes is continuously reconciled to match it.
#
# Why you need it
# You need this because it turns manual Kubernetes deployment 
# into GitOps. Instead of running Helm commands by hand or editing 
# resources directly in the cluster, you commit changes to Git and 
# Argo CD handles deployment and drift correction. That gives you 
# auditability, rollback through Git history, and consistent prod deployments.
#
# It is especially valuable for production monitoring because monitoring 
# is infrastructure, not an ad hoc app install. Prometheus, Grafana, Alertmanager, 
# and related components need stable configuration, controlled changes, and a clear 
# source of truth.
#
# Why Helm is used here
# Helm is used because kube-prometheus-stack is a large, configurable 
# chart that packages Prometheus, Grafana, Alertmanager, node-exporter, 
# and kube-state-metrics together. Using Helm lets you keep the base 
# chart versioned while customizing production behavior through a 
# separate values file.
#
# That means you can manage things like:
#   - retention settings.
#   - resource requests and limits.
#   - alert rules.
#   - ingress and authentication.
#   - scrape settings and service monitors.
#
# This is cleaner than copying and editing many raw YAML 
# files because upgrades become easier and your prod settings 
# stay isolated in one values file.
#
# Why the repo path matters
# The path tells Argo CD exactly where the monitoring YAML 
# or Helm manifests live in the repository. If the path is 
# wrong, Argo CD will either fail to sync or deploy the wrong 
# content. In GitOps, this path is effectively the deployment 
# contract between Git and the cluster.
#
# If your chart is stored locally in the repo, Argo CD uses 
# the folder path. If you are referencing a remote chart like 
# prometheus-community/kube-prometheus-stack, then you may 
# instead use source.chart plus the Helm repo details, which 
# is a slightly different pattern.
#
# Typical production use cases
# Common production uses for this pattern are:
#   - Installing and managing the cluster monitoring stack.
#   - Keeping prod and non-prod values separate.
#   - Rolling out chart upgrades through pull requests.
#   - Enforcing consistent monitoring across multiple clusters.
#   - Recovering quickly after accidental cluster changes.
#
# A practical example is this: a teammate increases Prometheus 
# retention in the prod values file, merges it, and Argo CD 
# applies the change automatically. If someone later edits 
# the Grafana deployment manually, Argo CD detects the drift 
# and restores the Git-defined version.
#
# One important caution
# For production, you usually want the project, repo permissions, 
# namespace restrictions, and sync policy to be aligned with your 
# team’s security model. Argo CD Projects are specifically meant 
# to control which repos can deploy where, and what kinds of 
# resources are allowed.
#
# So this file is not just “deploying monitoring”; it is also 
# part of your deployment governance. That is why production 
# setups often have stricter app/project boundaries than dev 
# environments
#Ensure it:
#   - Points at the repo path containing the monitoring YAML.
#   - Uses Helm with the kube-prometheus-stack chart and value file.
#
#Option A: Local chart path
#Use this when the kube-prometheus-stack chart files live inside your Git repository.
apiVersion: argoproj.io/v1alpha1  # Argo CD Application CRD version
kind: Application                 # Tells Kubernetes this is an Argo CD app definition
metadata:
  name: monitoring-prod           # Unique name for this production monitoring app
  namespace: argocd               # Argo CD control plane namespace where the app object lives
spec:
  project: default                # Argo CD project controlling permissions and source/destination access
  source:
    repoURL: https://github.com/your-org/your-repo.git   # Git repository containing the chart/manifests
    targetRevision: main                                  # Branch, tag, or commit to deploy from
    path: infra/k8s/monitoring                           # Folder in the repo containing the Helm chart or manifests
    helm:
      releaseName: kube-prometheus-stack                # Helm release name shown in the cluster
      valueFiles:
        - kube-prometheus-stack-values-prod.yaml        # Production-specific Helm values file
  destination:
    server: https://kubernetes.default.svc              # In-cluster Kubernetes API server
    namespace: monitoring                               # Namespace where monitoring resources will be installed
  syncPolicy:
    automated:                                          # Enable automatic Git-to-cluster sync
      prune: true                                       # Delete resources removed from Git
      selfHeal: true                                    # Revert manual cluster drift back to Git state
    syncOptions:
      - CreateNamespace=true                            # Create the target namespace if it does not already exist

# Option B: Remote prometheus-community Helm repo
# Use this when you want Argo CD to pull the chart directly from the Helm repository instead of storing the chart locally.

