#
{{- if eq .Values.global.environment "dev" }} 
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-myapp-dev
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  myapp-overview.json: |
{{ .Files.Get "grafana/dashboards/dev/myapp/myapp-overview.json" | indent 4 }}
  myapp-slo.json: |
{{ .Files.Get "grafana/dashboards/dev/myapp/myapp-slo.json" | indent 4 }}
{{- end }}